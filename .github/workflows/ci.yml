name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows (MSVC)
          - os: ubuntu-24.04
            name: Linux (GCC)

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev libopenmpt-dev

      - name: Fetch libopenmpt devel package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl.exe -L -o libopenmpt.zip "https://lib.openmpt.org/files/libopenmpt/dev/libopenmpt-0.8.7+release.dev.windows.vs2022.zip"
          Expand-Archive libopenmpt.zip libopenmpt-dev

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DPVT_LIBOPENMPT_SYSTEM=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DPVT_LIBOPENMPT_DIR="${{ github.workspace }}/libopenmpt-dev"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
